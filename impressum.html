<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <title>Impressum</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ===== MOBILE FIX ===== */
    @media (max-width: 768px) {

      .app {
        display: flex;
        flex-direction: column;
      }

      /* Sidebar → oben */
      .sidebar {
        width: 100%;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .brand-title {
        font-size: 16px;
      }

      .sidebar-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
      }

      .sidebar-nav li {
        margin: 0;
      }

      .sidebar-nav a {
        font-size: 13px;
        padding: 6px 10px;
      }

      /* Impressum + Datenschutz untereinander */
      .sidebar-nav li:last-child,
      .sidebar-nav li:nth-last-child(2) {
        width: 100%;
        margin-top: 4px;
      }

      /* Main */
      .main {
        padding: 12px;
      }

      .section h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      .section h2 {
        font-size: 16px;
        margin-top: 16px;
        margin-bottom: 6px;
      }

      .section p {
        font-size: 14px;
        line-height: 1.5;
      }

      /* Kontakt als Card */
      .section {
        padding: 14px;
        border-radius: 12px;
        background: rgba(255,255,255,0.03);
      }

      /* Mail besser klickbar */
      .section a {
        display: inline-block;
        margin-top: 6px;
        word-break: break-word;
      }
    }
  </style>
</head>

<body>

        <span class="brand-blob">M</span>

        <li><a href="minispiele.html">Mini-Spiele</a></li>

        <li style="margin-top: 12px;">

        </li>
        <li>
          <a href="datenschutz.html" style="font-size: 12px; color: #8f98b2;">Datenschutz</a>
        </li>

    </aside>

    <main class="main">
